spring:
  application:
    name: user-service
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/SkillBridgeDB}

  # Security - OAuth2 Resource Server with Keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/micropc}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/micropc/protocol/openid-connect/certs}

# Server Configuration
server:
  port: 8083
  servlet:
    context-path: /

# Logging Configuration
logging:
  level:
    root: INFO
    com.mss.user_service: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

# Azure Blob Storage Configuration
azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
    container-name: avatars

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
